name: Build, Push to GHCR, and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  # Step 1: Build and Push to GitHub Container Registry
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Step 2: Deploy to EC2 Instance
  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2 via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest image
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # Stop and remove existing container if it exists
            docker stop snapcart-app || true
            docker rm snapcart-app || true
            
            # Run the new container
            docker run -d \
              --name snapcart-app \
              -p 80:3000 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository }}:latest
            
            # Clean up unused images
            docker image prune -af

  # Step 3: Trigger AWS Lambda for Deployment Logging
  notify-lambda:
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    if: always()

    steps:
      - name: Trigger Lambda Function
        run: |
          curl -X POST ${{ secrets.LAMBDA_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "status": "${{ needs.deploy-to-ec2.result }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "commit_author": "${{ github.event.head_commit.author.name }}",
              "commit_author_email": "${{ github.event.head_commit.author.email }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "repository": "${{ github.repository }}",
              "actor": "${{ github.actor }}",
              "workflow": "${{ github.workflow }}"
            }'
